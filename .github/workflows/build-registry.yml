name: Build Registry

on:
  release:
    types: [published]
  # schedule:
    # Runs every day at midnight to catch any new icons added to the icons repo
    # - cron: '0 0 * * *'
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger when a version tag like v1.0.0 is pushed
    paths:
      - 'src/scripts/build-registry.ts'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: write # Needed to commit the updated registry files back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Registry
        run: npm run build:registry
        env:
          # Automatically provided by GitHub Actions, so no setup is needed!
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f registry/
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "chore(registry): auto-update registry JSON files [skip ci]" && git push origin HEAD:refs/heads/main)
